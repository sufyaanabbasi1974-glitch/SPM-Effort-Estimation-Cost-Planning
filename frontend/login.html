<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPM System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-attachment: fixed;
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=1920');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            pointer-events: none;
            z-index: 0;
        }

        body.dark-theme {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-theme::before {
            background-image: url('https://images.pexels.com/photos/3183151/pexels-photo-3183151.jpeg?auto=compress&cs=tinysrgb&w=1920');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 16px 14px;
            width: 50%;
            position: relative;
            z-index: 1;
            margin: 0 auto;
        }
        
        @media (min-width: 480px) {
            .login-container {
                padding: 28px;
                margin: 0 auto;
            }
        }

        body.dark-theme .login-container {
            background: #2d3561;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        .login-header {
            text-align: center;
            margin-bottom: 18px;
        }

        .login-header h1 {
            color: #333;
            font-size: 20px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        
        @media (min-width: 480px) {
            .login-header h1 {
                font-size: 24px;
            }
        }

        .login-header p {
            color: #666;
            font-size: 12px;
        }
        
        @media (min-width: 480px) {
            .login-header p {
                font-size: 14px;
            }
        }

        body.dark-theme .login-header h1 {
            color: #e0e0e0;
        }

        body.dark-theme .login-header p {
            color: #a0a0a0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }

        body.dark-theme .form-label {
            color: #e0e0e0;
        }

        .form-control {
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        body.dark-theme .form-control {
            background-color: #3d4570;
            border-color: #5d6580;
            color: #e0e0e0;
        }

        body.dark-theme .form-control:focus {
            background-color: #4d5580;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            color: #e0e0e0;
        }

        .login-btn {
            width: 100%;
            padding: 9px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #721c24;
            display: none;
        }

        body.dark-theme .error-message {
            background-color: #5a3a3a;
            color: #ff8a8a;
            border-left-color: #ff8a8a;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #155724;
            display: none;
        }

        body.dark-theme .success-message {
            background-color: #3a5a3a;
            color: #8aff8a;
            border-left-color: #8aff8a;
        }

        .demo-credentials {
            background-color: #e7f3ff;
            color: #004085;
            padding: 10px;
            border-radius: 6px;
            margin-top: 14px;
            font-size: 11px;
            border-left: 4px solid #0c5460;
        }

        .demo-credentials strong {
            display: block;
            margin-bottom: 5px;
        }

        body.dark-theme .demo-credentials {
            background-color: #3d5a7d;
            color: #a8d5ff;
            border-left-color: #667eea;
        }

        .spinner {
            display: none;
            margin-right: 8px;
        }

        .loading .spinner {
            display: inline-block;
        }

        .loading .login-btn {
            opacity: 0.7;
            cursor: not-allowed;
        }

        body.dark-theme {
            color: #e0e0e0;
        }

        /* Mobile Responsive Styles */
        @media (max-width: 576px) {
            body {
                padding: 0;
                margin: 0;
            }

            body::before {
                background-size: auto;
            }

            .login-container {
                border-radius: 0;
                max-width: 100%;
                width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                margin: 0;
                padding: 20px;
                min-height: 100vh;
            }

            .login-header {
                margin-bottom: 20px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .login-header p {
                font-size: 12px;
            }

            .manager-cards-container {
                gap: 8px;
                margin-bottom: 15px;
            }

            .manager-card {
                width: 80px;
                padding: 10px;
            }

            .card-icon {
                font-size: 22px;
            }

            .card-title {
                font-size: 9px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            .form-label {
                font-size: 12px;
                margin-bottom: 6px;
            }

            .form-control {
                padding: 10px;
                font-size: 12px;
                border-radius: 4px;
            }

            .login-btn {
                padding: 10px;
                font-size: 14px;
                margin-top: 5px;
            }

            .demo-credentials {
                font-size: 11px;
                padding: 10px;
                margin-top: 15px;
            }

            .error-message,
            .success-message {
                font-size: 12px;
                padding: 10px;
            }

            #themeToggle {
                font-size: 18px !important;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 15px;
                border-radius: 0;
            }

            .manager-cards-container {
                gap: 6px;
            }

            .manager-card {
                width: 70px;
                padding: 8px;
            }

            .card-icon {
                font-size: 20px;
            }

            .card-title {
                font-size: 8px;
            }

            .login-header h1 {
                font-size: 18px;
            }

            .form-control {
                font-size: 11px;
                padding: 8px;
            }

            .login-btn {
                font-size: 13px;
                padding: 8px;
            }

            .demo-credentials {
                font-size: 10px;
            }
        }

        /* Manager Cards Styling for Login */
        .manager-cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .manager-card {
            border-radius: 12px;
            padding: 15px 12px;
            width: 110px;
            text-align: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .manager-card:hover {
            transform: translateY(-2px);
        }

        .card-icon {
            font-size: 28px;
            line-height: 1;
        }

        .card-title {
            font-size: 11px;
            font-weight: 600;
            margin: 0;
        }
    </style>
    <meta name="api-base" content="https://your-backend-url.railway.app">
    <script>
        // Set API base URL from environment or meta tag
        window.API_BASE = localStorage.getItem('API_BASE') || 
                         document.querySelector('meta[name="api-base"]')?.content || 
                         '/api';
    </script>
</head>
<body>
    <div class="login-container">
        <!-- Theme Toggle -->
        <div style="position: absolute; top: 15px; right: 15px;">
            <button id="themeToggle" class="btn btn-sm" style="background: none; border: none; font-size: 20px;">
                🌙
            </button>
        </div>

        <!-- Manager Images -->
        <div style="text-align: center; margin-bottom: 14px;">
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center;">
                <div style="position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.2); width: 70px; height: 70px;">
                    <img src="https://images.pexels.com/photos/3183150/pexels-photo-3183150.jpeg?auto=compress&cs=tinysrgb&w=200&h=200&fit=crop" alt="Team Management" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div style="position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.2); width: 70px; height: 70px;">
                    <img src="https://images.pexels.com/photos/3183197/pexels-photo-3183197.jpeg?auto=compress&cs=tinysrgb&w=200&h=200&fit=crop" alt="Project Planning" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div style="position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.2); width: 70px; height: 70px;">
                    <img src="https://images.pexels.com/photos/3183151/pexels-photo-3183151.jpeg?auto=compress&cs=tinysrgb&w=200&h=200&fit=crop" alt="Business Strategy" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div style="position: relative; border-radius: 8px; overflow: hidden; box-shadow: 0 3px 10px rgba(0,0,0,0.2); width: 70px; height: 70px;">
                    <img src="https://images.pexels.com/photos/3182812/pexels-photo-3182812.jpeg?auto=compress&cs=tinysrgb&w=200&h=200&fit=crop" alt="Workflow Management" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="login-header">
            <h1>📊 SPM System</h1>
            <p>Software Project Management</p>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <!-- Login Form -->
        <form id="loginForm">
            <!-- Username Field -->
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="username" 
                    name="username"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                >
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <!-- Login Button -->
            <button type="submit" class="login-btn" id="loginBtn">
                <span class="spinner">⏳</span>
                Login
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="demo-credentials">
            <strong>Demo Credentials:</strong>
            Username: <strong>admin</strong><br>
            Password: <strong>password</strong>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const themeToggle = document.getElementById('themeToggle');

        // Theme Management
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-theme');
                themeToggle.textContent = '☀️';
            } else {
                document.body.classList.remove('dark-theme');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️' : '🌙';
        });

        // Handle form submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear messages
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            // Get credentials
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // Validate inputs
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            try {
                // Send login request
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Show success message
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect to home page after 1 second
                    setTimeout(() => {
                        window.location.href = '/home';
                    }, 1000);
                } else {
                    // Show error message
                    showError(data.error || 'Invalid credentials. Please try again.');
                    
                    // Clear password field
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('An error occurred. Please try again.');
            } finally {
                // Remove loading state
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // Helper functions
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.style.display = 'block';
        }

        // Auto-focus username field
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            usernameInput.focus();
        });

        // Allow Enter key in password field
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
